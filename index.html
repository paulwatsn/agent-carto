<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Agent Cartographique — Communes du Val d'Oise</title>
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      calcite-shell {
        display: flex;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <calcite-shell>
      <arcgis-map id="carte-vdo" item-id="48ca49bb92c94f01b7c24eee1c7d7e0a">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-expand slot="top-left">
          <arcgis-legend></arcgis-legend>
        </arcgis-expand>
      </arcgis-map>

      <calcite-shell-panel slot="panel-end" width="l" id="assistant-panel">
        <calcite-panel>
          <arcgis-assistant
            log-enabled
            copy-enabled
            reference-element="#carte-vdo"
            heading="Assistant — Communes et EPCI du Val d'Oise"
            description="Explorez les données démographiques et géographiques des communes et EPCI du Val d'Oise."
            entry-message="Bonjour ! Je peux vous aider à explorer les  et les EPCI du Val d'Oise. Posez-moi une question sur la population, la superficie ou d'autres caractéristiques des communes et EPCI.">
            <arcgis-assistant-navigation-agent></arcgis-assistant-navigation-agent>
            <arcgis-assistant-data-exploration-agent></arcgis-assistant-data-exploration-agent>
            <arcgis-assistant-help-agent></arcgis-assistant-help-agent>
          </arcgis-assistant>
        </calcite-panel>
      </calcite-shell-panel>
    </calcite-shell>

    <script type="module">
      const assistantElement = document.querySelector("arcgis-assistant");
      assistantElement.suggestedPrompts = [
        "Quelle est la commune la plus peuplée du Val d'Oise ?",
        "Quelles communes ont une superficie supérieure à 20 km² ?",
        "Zoom sur Cergy",
        "Compare la population des 5 plus grandes communes",
      ];
    </script>
  </body>
</html>
